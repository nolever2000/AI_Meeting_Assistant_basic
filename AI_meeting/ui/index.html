<!DOCTYPE html>
<html>
<head>
    <title>AI Meeting Assistant</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .msg {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
        }

        .mic {
            background: #1e40af;
        }

        .system {
            background: #065f46;
        }

        .time {
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🎤 AI Realtime Translator</h2>
    <div id="log"></div>
</div>

<script>
const socket = io();
const log = document.getElementById("log");

socket.on("transcript", (data) => {
    const div = document.createElement("div");

    div.className = "msg " + data.source;

    div.innerHTML = `
        <b>${data.source.toUpperCase()}</b>: ${data.text}
        <div class="time">${data.time}</div>
    `;

    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
});
</script>

</body>
</html>
