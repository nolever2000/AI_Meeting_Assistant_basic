<!DOCTYPE html>
<html>
<head>
    <title>AI Meeting</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>

<h2>Realtime Speech</h2>
<div id="log"></div>

<script>
    const socket = io();

    socket.on("text", (data) => {
        const div = document.getElementById("log");
        div.innerHTML += "<p>" + data.text + "</p>";
    });
</script>

</body>
</html>
